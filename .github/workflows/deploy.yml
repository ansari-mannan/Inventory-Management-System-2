name: Build and Deploy IMS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: ims-eks
  DOCKERHUB_USER: amannan15

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag images with the commit SHA so every push is a genuinely new rollout
      - name: Build and push backend
        run: |
          docker build -t $DOCKERHUB_USER/ims-backend:${{ github.sha }} -t $DOCKERHUB_USER/ims-backend:latest ./ims/backend
          docker push $DOCKERHUB_USER/ims-backend:${{ github.sha }}
          docker push $DOCKERHUB_USER/ims-backend:latest

      - name: Build and push frontend
        run: |
          docker build -t $DOCKERHUB_USER/ims-frontend:${{ github.sha }} -t $DOCKERHUB_USER/ims-frontend:latest ./ims/frontend
          docker push $DOCKERHUB_USER/ims-frontend:${{ github.sha }}
          docker push $DOCKERHUB_USER/ims-frontend:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to the cluster
        run: aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      - name: Deploy
        run: |
          kubectl set image deployment/ims-backend backend=$DOCKERHUB_USER/ims-backend:${{ github.sha }}
          kubectl set image deployment/ims-frontend frontend=$DOCKERHUB_USER/ims-frontend:${{ github.sha }}
          kubectl rollout status deployment/ims-backend
          kubectl rollout status deployment/ims-frontend