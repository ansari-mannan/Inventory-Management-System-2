apiVersion: v1
kind: ConfigMap
metadata:
  name: ims-config
  labels:
    app: ims
data:
  # Non-secret DB connection details. Replace placeholders with your RDS values.
  DB_HOST: "your-db.xxxxxx.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "ims"
  DB_USER: "ims_user"
  DB_SSL: "true"
