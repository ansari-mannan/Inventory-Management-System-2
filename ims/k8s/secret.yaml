apiVersion: v1
kind: Secret
metadata:
  name: ims-secret
  labels:
    app: ims
type: Opaque
# Values under `data:` must be base64-encoded. Example:
#   echo -n 'your-db-password' | base64
# The placeholder below is the base64 of "change-me".
data:
  DB_PASSWORD: "Y2hhbmdlLW1l"
# Tip: alternatively use `stringData:` to provide raw values that K8s encodes
# for you, but never commit real credentials to source control.
