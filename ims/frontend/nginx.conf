server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: serve index.html for any route so client-side routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # NOTE: we deliberately do NOT proxy /api here. In Kubernetes the ingress
  # routes /api to the backend service. This keeps the frontend container a
  # pure static file server with no knowledge of the backend.

  # Light caching for hashed static assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
