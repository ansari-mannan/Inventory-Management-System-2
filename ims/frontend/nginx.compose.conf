# LOCAL DEV ONLY (docker-compose). This config is mounted over the image's
# default.conf so the single :8080 origin can serve the SPA *and* reach the
# backend via the relative /api path — the job the Kubernetes ingress does in
# production. The baked-in nginx.conf intentionally does NOT proxy /api.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
